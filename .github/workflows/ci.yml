name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet format --verify-no-changes --verbosity diagnostic

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory coverage
      - uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "coverage/**/coverage.cobertura.xml"
          targetdir: "coveragereport"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker build -t workpac/applications-api -f src/Services/WorkPac.Recruitment.Applications.Api/Dockerfile .
          docker build -t workpac/matching-service -f src/Services/WorkPac.Recruitment.Matching.Service/Dockerfile .
